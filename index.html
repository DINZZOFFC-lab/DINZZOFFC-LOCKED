<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked By DinzzOffc</title>
    <style>
        /* Mengatur dasar halaman */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Hitam pekat */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace; /* Gaya font koding/hacker */
            color: #ffffff;
            overflow: hidden;
        }

        /* Container utama untuk teks, gambar, dan tombol */
        .content {
            text-align: center;
            z-index: 2;
            padding: 20px;
        }

        /* Gaya ikon kunci (Emoji) */
        .lock-icon {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Gaya teks peringatan */
        .warning-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Penekanan pada nama DinzzOffc */
        .brand {
            color: #ff0000;
            font-size: 28px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }

        /* Container Tombol */
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        /* Style dasar tombol ala tema hacker */
        button {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 5px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        /* Tombol Nyala (FREE) - Hijau Matrix */
        #btnNyalakan {
            background: transparent;
            color: #00ff41;
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        #btnNyalakan:hover {
            background: #00ff41;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
        }

        /* Tombol Mati (BERBAYAR) - Merah Neon */
        #btnMatikan {
            background: transparent;
            color: #ff0000;
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        #btnMatikan:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        button:active { transform: scale(0.95); }

        /* Teks Status di bagian bawah */
        #status {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #888;
            letter-spacing: 1px;
        }

        /* Animasi kunci berdenyut */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Efek garis-garis scan (scanlines) ala layar monitor tua */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>

    <div class="content">
        <span class="lock-icon">🔒</span>
        
        <div class="warning-text">
            YOUR HANDPHONE LOCKED BY <br>
            <span class="brand">DINZZOFFC</span>
        </div>

        <div class="btn-container">
            <button id="btnNyalakan">FREE</button>
            <button id="btnMatikan">BERBAYAR</button>
        </div>

        <p id="status">SYS_STATUS: READY_TO_EXECUTE</p>
    </div>

    <script>
        const btnNyalakan = document.getElementById('btnNyalakan');
        const btnMatikan = document.getElementById('btnMatikan');
        const statusText = document.getElementById('status');
        let track = null;

        async function controlFlash(action) {
            try {
                if (action === 'on') {
                    statusText.innerText = "SYS_STATUS: INITIALIZING_FREE_MODE...";
                    
                    // Meminta izin kamera belakang
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment' }
                    });

                    track = stream.getVideoTracks()[0];
                    const capabilities = track.getCapabilities();

                    // Validasi hardware flash
                    if (!capabilities.torch) {
                        statusText.innerText = "SYS_STATUS: ERROR_HARDWARE_NOT_SUPPORTED";
                        return;
                    }

                    // Nyalakan Senter
                    await track.applyConstraints({ advanced: [{ torch: true }] });
                    statusText.innerText = "SYS_STATUS: TORCH_ACTIVATED [FREE_MODE]";
                } else {
                    // Logika tombol BERBAYAR (Mematikan Senter)
                    if (track) {
                        await track.applyConstraints({ advanced: [{ torch: false }] });
                        track.stop();
                    }
                    statusText.innerText = "SYS_STATUS: TORCH_DEACTIVATED [PAID_MODE]";
                }
            } catch (err) {
                console.error(err);
                if (err.name === "NotAllowedError") {
                    statusText.innerText = "SYS_STATUS: ACCESS_DENIED (NEED_PAYMENT?)";
                } else {
                    statusText.innerText = "SYS_STATUS: CRITICAL_ERROR_CHECK_HTTPS";
                }
            }
        }

        btnNyalakan.addEventListener('click', () => controlFlash('on'));
        btnMatikan.addEventListener('click', () => controlFlash('off'));
    </script>
</body>
</html>
