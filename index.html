<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Locked By DinzzOffc</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mengunci total scroll dan zoom layar HP */
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .icon-lock {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-action {
            background-color: #ff3b30; /* Ganti merah biar makin serem */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
        }

        /* --- ANIME LAYAR RUSAK PARAH --- */
        @keyframes hancur {
            0% { transform: translate(3px, 2px) skew(5deg); filter: hue-rotate(0deg) invert(0); }
            20% { transform: translate(-3px, -2px) skew(-5deg); filter: hue-rotate(90deg) invert(1); }
            40% { transform: translate(0px, 3px) inset(2px); filter: hue-rotate(180deg); }
            60% { transform: translate(4px, -1px) skew(10deg); filter: hue-rotate(270deg) invert(1); }
            80% { transform: translate(-2px, 2px) skew(-10deg); }
            100% { transform: translate(1px, -2px) skew(0deg); filter: hue-rotate(360deg) invert(0); }
        }
        .total-crash {
            animation: hancur 0.1s infinite !important;
            background-color: #ff0000 !important;
            pointer-events: none !important; /* Mematikan semua fungsi klik di luar alert */
        }
    </style>
</head>
<body>

    <div class="container" id="konten">
        <div class="icon-lock">⚠️</div>
        <h2>CRITICAL SYSTEM ERROR</h2>
        <p>Perangkat Anda telah dikunci oleh DinzzOffc akibat pelanggaran sistem. Ketuk tombol di bawah untuk perbaikan otomatis.</p>
        <button class="btn-action" id="tombolGembok" onclick="eksekusiCrash()">PERBAIKI SEKARANG</button>
    </div>

    <script>
        function eksekusiCrash() {
            const body = document.body;
            
            // 1. Paksa masuk mode Full Screen biar bar browser hilang!
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen(); // Untuk Safari/iOS
            }

            // 2. Aktifkan animasi layar hancur dan kedap-kedip pelangi-merah
            body.classList.add("total-crash");

            // 3. Loop Alert Bertubi-tubi yang gak bisa di-close dengan gampang
            setTimeout(() => {
                // Total ada 10 alert berturut-turut. Korban dijamin capek mencet OK
                for (let i = 1; i <= 10; i++) {
                    alert("🚨 CRITICAL WARNING (" + i + "/10): Trojans detected in system root!");
                }
                
                alert("SYSTEM DEAD: Sini sungkem dulu sama DinzzOffc baru HP-nya lancar lagi 😂");
                
                // Kembalikan normal setelah siksaan selesai
                body.classList.remove("total-crash");
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }, 300);
        }
    </script>

</body>
</html>
