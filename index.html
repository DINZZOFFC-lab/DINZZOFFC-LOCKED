<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked By DinzzOffc</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.1s;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        .icon-lock {
            font-size: 60px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h2 {
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            color: #8e8e93;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn-action {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            transition: transform 0.1s;
        }
        .btn-action:active {
            transform: scale(0.98);
        }

        /* --- EFEK JAHIL (KEDAP KEDIP & GETAR) --- */
        @keyframes lagGemetar {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(1deg); }
            80% { transform: translate(-1px, -1px) rotate(0deg); }
            90% { transform: translate(2px, 2px) rotate(-2deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        @keyframes kedapKedipMerah {
            0%, 100% { background-color: #000; }
            50% { background-color: #aa0000; }
        }
        .layar-lag {
            animation: lagGemetar 0.15s infinite, kedapKedipMerah 0.2s infinite !important;
            cursor: none !important;
        }
        /* Efek bikin tombol gak bisa dipencet pas freeze */
        .freeze-total {
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="konten">
        <div class="icon-lock">🔒</div>
        <h2>DEVICE LOCKED BY DINZZOFFC</h2>
        <p>Sistem mendeteksi aktivitas ilegal. Silakan ketuk tombol di bawah untuk membuka kunci perangkat Anda.</p>
        <button class="btn-action" id="tombolGembok" onclick="mulaiEfekLag()">Buka Kunci Perangkat</button>
    </div>

    <script>
        function mulaiEfekLag() {
            const body = document.body;
            const tombol = document.getElementById("tombolGembok");

            // 1. Bikin HP Freeze (Tombol gak bisa di-klik lagi)
            body.classList.add("freeze-total");
            tombol.innerText = "Memproses...";
            tombol.style.backgroundColor = "#555";

            // 2. Tunggu 1 detik, lalu mulai efek kedap-kedip + layar getar parah
            setTimeout(() => {
                body.classList.add("layar-lag");
                
                // 3. Pas lagi kedap-kedip, munculin alert eror bertubi-tubi biar makin panik
                setTimeout(() => {
                    alert("⚠️ SYSTEM ERROR: UI Sistem tidak menanggapi!");
                    alert("⚠️ Peringatan: Suhu perangkat terlalu tinggi (Overheating)!");
                    alert("⚠️ Mencoba memulihkan kernel... Gagal.");
                    
                    // 4. Setelah alert ditutup semua, efeknya hilang dan kembali normal
                    body.classList.remove("layar-lag");
                    body.classList.remove("freeze-total");
                    tombol.innerText = "Buka Kunci Perangkat";
                    tombol.style.backgroundColor = "#007aff";
                    
                    alert("Aman bro, cuma pranking doang kok! 😂 - DinzzOffc");
                }, 500);

            }, 1000);
        }
    </script>

</body>
</html>
