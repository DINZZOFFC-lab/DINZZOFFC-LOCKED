<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked By DinzzOffc</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #080a10;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            background: rgba(15, 22, 38, 0.9);
            padding: 30px 25px;
            border-radius: 20px;
            border: 2px solid #ff3b30;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.3);
        }
        
        .glitch-title {
            font-size: 24px;
            font-weight: 800;
            color: #ff3b30;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            position: relative;
            animation: glitchAnim 1s infinite linear alternate-reverse;
        }
        @keyframes glitchAnim {
            0% { text-shadow: 2px 0 0 #00ffff, -2px 0 0 #ff3b30; }
            50% { text-shadow: -2px 0 0 #00ffff, 2px 0 0 #ff3b30; }
            100% { text-shadow: 2px 0 0 #00ffff, -2px 0 0 #ff3b30; }
        }

        p {
            color: #d1d5db;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        
        .timer-box {
            font-size: 36px;
            font-weight: bold;
            color: #ffcc00;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ffcc00;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .btn-action {
            background: linear-gradient(135deg, #ff3b30, #b31b1b);
            color: white;
            border: none;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
            transition: transform 0.1s;
        }
        .btn-action:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px; margin-bottom: 10px;">⚠️</div>
        <div class="glitch-title">DEVICE LOCKED</div>
        
        <p>Perangkat Anda telah dikunci oleh sistem keamanan <b>DinzzOffc</b>. Untuk membuka kembali akses penuh sistem, silakan lakukan penyelesaian administrasi ke DANA <b>081xxxxxxxxx</b>.</p>
        
        <div class="timer-box" id="timer">00:60</div>
        
        <button class="btn-action" onclick="bukaKunci()">PROSES PEMBUKAAN</button>
    </div>

    <script>
        let waktu = 60;
        const timerElement = document.getElementById('timer');
        
        const hitungMundur = setInterval(() => {
            waktu--;
            let detik = waktu < 10 ? "0" + waktu : waktu;
            timerElement.innerText = "00:" + detik;
            
            if (waktu <= 0) {
                clearInterval(hitungMundur);
                timerElement.innerText = "TIME OUT";
                timerElement.style.color = "#ff3b30";
                timerElement.style.borderColor = "#ff3b30";
            }
        }, 1000);

        function bersuara() {
            let pesanSuara = new SpeechSynthesisUtterance("HAHAHA. YOUR DEVICE ALREADY LOCKED BY DINZZ OFF C");
            pesanSuara.lang = "en-US";
            pesanSuara.rate = 0.9;     
            pesanSuara.pitch = 0.8;    
            window.speechSynthesis.speak(pesanSuara);
        }

        document.body.onclick = function() {
            bersuara();
            document.body.onclick = null; 
        };

        function bukaKunci() {
            bersuara();

            setTimeout(() => {
                // Hanya memunculkan pesan ancaman palsu saja
                alert("YAHAHA YOUR DATA ALREADY SENT TO PINJOL! 💸😈");
            }, 500);
        }
    </script>

</body>
</html>
