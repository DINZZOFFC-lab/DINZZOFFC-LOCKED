<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked By DinzzOffc</title>
    <style>
        /* Mengatur dasar halaman */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505; /* Hitam pekat */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace; /* Gaya font koding/hacker */
            color: #ffffff;
            overflow: hidden;
        }

        /* Container utama untuk teks dan gambar */
        .content {
            text-align: center;
            z-index: 2;
        }

        /* Gaya ikon kunci (Emoji) */
        .lock-icon {
            font-size: 100px;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: pulse 1.5s infinite ease-in-out;
        }

        /* Gaya teks peringatan */
        .warning-text {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            line-height: 1.5;
        }

        /* Penekanan pada nama DinzzOffc */
        .brand {
            color: #ff0000;
            font-size: 28px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
        }

        /* Animasi kunci berdenyut */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Efek garis-garis scan (scanlines) ala layar monitor tua */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.06), 
                rgba(0, 255, 0, 0.02), 
                rgba(0, 0, 255, 0.06)
            );
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 3;
        }
    </style>
</head>
<body>

    <!-- Efek layar monitor -->
    <div class="scanlines"></div>

    <div class="content">
        <!-- Ikon Kunci -->
        <span class="lock-icon">🔒</span>
        
        <!-- Teks Pesan -->
        <div class="warning-text">
            YOUR HANDPHONE LOCKED BY <br>
            <span class="brand">DINZZOFFC</span>
        </div>
    </div>

</body>
</html>
